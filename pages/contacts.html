<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Контакты — Studio19.03</title>
  <meta name="description" content="Контакты Studio19.03">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=STIX+Two+Text:wght@500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/art-direction.css">
  <link rel="stylesheet" href="../css/pages.css">
  <link rel="stylesheet" href="../css/pages/inner.css">
  <link rel="stylesheet" href="../css/typography.css">
  <link rel="stylesheet" href="../css/tilda-fixes.css">
</head>
<body>
  <div id="studio1903" class="s1903-page s1903-page--inner">
    <header class="s1903-header s1903-header--light" role="banner">
      <div class="s1903-container s1903-header__inner">
        <a href="/" class="s1903-header__logo" aria-label="Studio19.03">
          <img class="s1903-header__logo-img s1903-header__logo-img--light" data-s1903-img="header.logo" alt="Studio19.03 — дизайн и архитектура" width="144" height="34" hidden>
          <img class="s1903-header__logo-img s1903-header__logo-img--dark" data-s1903-img="header.logoDark" alt="Studio19.03 — дизайн и архитектура" width="144" height="34" hidden>
          <span class="s1903-header__logo-text" data-s1903="header.logo">Studio19.03</span>
        </a>

        <nav class="s1903-nav" aria-label="Основная навигация" data-s1903="nav.desktop"></nav>

        <div class="s1903-header__right">
          <a class="s1903-header__phone" data-s1903="header.phone" data-s1903-href="header.phone" href="tel:+79662508450"></a>
          <a class="s1903-header__cta" data-s1903="header.cta" data-s1903-href="form" href="/contacts"></a>
        </div>

        <button class="s1903-burger" type="button" aria-label="Открыть меню" aria-expanded="false" aria-controls="s1903-menu">
          <span class="s1903-burger__line"></span>
          <span class="s1903-burger__line"></span>
          <span class="s1903-burger__line"></span>
        </button>
      </div>
    </header>

    <div class="s1903-menu" id="s1903-menu" aria-hidden="true">
      <nav class="s1903-menu__links" data-s1903="nav.mobile" aria-label="Мобильная навигация"></nav>
      <div class="s1903-menu__footer">
        <a class="s1903-menu__phone" data-s1903="header.phone" data-s1903-href="header.phone" href="tel:+79662508450"></a>
        <a class="s1903-menu__cta" data-s1903="header.cta" data-s1903-href="form" href="/contacts"></a>
        <p class="s1903-menu__address" data-s1903="header.menuAddress"></p>
      </div>
    </div>

    <main class="s1903-page--inner s1903-contacts-page">
      <section class="s1903-page-hero">
        <div class="s1903-container">
          <h1 class="s1903-title s1903-reveal" data-s1903="contacts.title"></h1>
          <p class="s1903-subtitle s1903-reveal" data-s1903="contacts.subtitle"></p>
        </div>
      </section>
      <section class="s1903-page-section">
        <div class="s1903-container">
          <div class="s1903-contacts-info">
            <div class="s1903-contacts-info__grid">
              <p class="s1903-contacts-info__item">
                <span class="s1903-contacts-info__label">Адрес</span>
                <span class="s1903-contacts-info__value" data-s1903="contacts.address"></span>
              </p>
              <p class="s1903-contacts-info__item">
                <span class="s1903-contacts-info__label">Телефон</span>
                <a class="s1903-contacts-info__value" data-s1903="contacts.phone" data-s1903-href="header.phone" href="tel:+79662508450"></a>
              </p>
              <p class="s1903-contacts-info__item">
                <span class="s1903-contacts-info__label">Email</span>
                <a class="s1903-contacts-info__value" data-s1903="contacts.email" href="mailto:info@studio1903.ru"></a>
              </p>
            </div>
          </div>
          <div class="s1903-advantages" data-s1903="contacts.advantages"></div>
        </div>
      </section>
            <section class="s1903-contact" id="s1903-form" aria-labelledby="s1903-form-title">
        <div class="s1903-container">
          <div class="s1903-contact__grid">
            <div class="s1903-contact__form-wrap">
              <header class="s1903-contact__intro s1903-reveal">
                <h2 class="s1903-title" id="s1903-form-title" data-s1903="form.title"></h2>
                <p class="s1903-subtitle" data-s1903="form.subtitle"></p>
                <p class="s1903-contact__text" data-s1903="form.text"></p>
              </header>

              <form class="s1903-form s1903-reveal" id="s1903-form-element" novalidate>
                <div class="s1903-field">
                  <label class="s1903-field__label" for="s1903-name" data-s1903-label="form.name">Имя</label>
                  <input class="s1903-input" type="text" id="s1903-name" name="name" autocomplete="name" required>
                  <p class="s1903-field__error" data-error-for="s1903-name" role="alert"></p>
                </div>
                <div class="s1903-field">
                  <label class="s1903-field__label" for="s1903-phone" data-s1903-label="form.phone">Телефон</label>
                  <input class="s1903-input" type="tel" id="s1903-phone" name="phone" autocomplete="tel" required>
                  <p class="s1903-field__error" data-error-for="s1903-phone" role="alert"></p>
                </div>
                <div class="s1903-field">
                  <label class="s1903-field__label" for="s1903-area" data-s1903-label="form.area">Площадь, м²</label>
                  <input class="s1903-input" type="text" id="s1903-area" name="area" inputmode="numeric" required>
                  <p class="s1903-field__error" data-error-for="s1903-area" role="alert"></p>
                </div>
                <label class="s1903-checkbox">
                  <input type="checkbox" id="s1903-privacy" name="privacy" required>
                  <span data-s1903="form.privacy"></span>
                </label>
                <p class="s1903-field__error" data-error-for="s1903-privacy" role="alert"></p>
                <button class="s1903-btn s1903-btn--full" type="submit" data-s1903="form.submit">Отправить</button>
              </form>

              <div class="s1903-form-success" id="s1903-form-success" hidden>
                <h3 class="s1903-title" data-s1903="form.success.title"></h3>
                <p class="s1903-subtitle" data-s1903="form.success.subtitle"></p>
                <p class="s1903-contact__text" data-s1903="form.success.text"></p>
                <a class="s1903-ghost" href="/portfolio" data-s1903="form.success.cta"></a>
              </div>
            </div>

            <aside class="s1903-contact__aside s1903-reveal" aria-label="Контакты">
              <p><a data-s1903="form.phone" data-s1903-href="header.phone" href="tel:+79662508450"></a></p>
              <p><a data-s1903="form.email" data-s1903-href="form.email" href="mailto:info@studio1903.ru"></a></p>
              <p data-s1903="form.address"></p>
              <p class="s1903-micro" data-s1903="form.phoneMicro"></p>
            </aside>
          </div>
        </div>
      </section>

    </main>
    <footer class="s1903-footer" role="contentinfo">
      <div class="s1903-container">
        <div class="s1903-footer__top">
          <span class="s1903-footer__logo" data-s1903="footer.logo">Studio19.03</span>
          <div class="s1903-footer__social" data-s1903="footer.social"></div>
        </div>
        <div class="s1903-footer__bottom">
          <span data-s1903="footer.copyright"></span>
          <span data-s1903="footer.address"></span>
          <a class="s1903-footer__policy" data-s1903="footer.policy" data-s1903-href="footer.policy" href="/privacy"></a>
        </div>
      </div>
    </footer>

  </div>
  <script src="../js/images.js"></script>
  <script src="../js/projects.js?v=1783795630418.7068"></script>
  <script src="../js/paths.js"></script>
  <script src="../js/content-shared.js"></script>
  <script src="../js/content-contacts.js"></script>
  <script src="../js/content.js"></script>
  <script src="../js/core.js"></script>
  <script src="../js/pages.js"></script>
</body>
</html>
