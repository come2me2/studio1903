<style>
/* ==========================================================================
   STUDIO19.03 — Design Tokens
   Редактируйте переменные ниже для глобальных изменений
   ========================================================================== */

#studio1903 {
  /* Layout */
  --s1903-container-max: 1440px;
  --s1903-container-pad: clamp(24px, 5vw, 80px);
  --s1903-header-height: 72px;
  --s1903-header-height-mobile: 64px;
  --s1903-grid-gap: 24px;

  /* Section padding */
  --s1903-section-pad: clamp(100px, 12vw, 200px);
  --s1903-section-pad-sm: clamp(80px, 8vw, 160px);

  /* Colors */
  --s1903-bg-primary: #f7f5f2;
  --s1903-bg-secondary: #eeebe6;
  --s1903-bg-elevated: #fdfcfa;
  --s1903-text-primary: #1a1a18;
  --s1903-text-secondary: #6b6860;
  --s1903-text-tertiary: #9c9890;
  --s1903-text-inverse: #f7f5f2;
  --s1903-text-inverse-muted: rgba(247, 245, 242, 0.75);
  --s1903-accent: #2c2a26;
  --s1903-accent-hover: #1a1a18;
  --s1903-border: #d8d4cc;
  --s1903-border-focus: #1a1a18;
  --s1903-error: #8b4518;
  --s1903-focus-ring: rgba(26, 26, 24, 0.25);
  --s1903-header-bg: rgba(247, 245, 242, 0.88);

  /* Typography */
  --s1903-font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --s1903-text-hero: clamp(2rem, 4vw + 1rem, 3.5rem);
  --s1903-text-h1: clamp(1.75rem, 2.5vw + 1rem, 2.5rem);
  --s1903-text-h3: clamp(1.25rem, 1.5vw + 0.5rem, 1.5rem);
  --s1903-text-body: clamp(1rem, 0.5vw + 0.9rem, 1.0625rem);
  --s1903-text-sm: clamp(0.875rem, 0.25vw + 0.8rem, 0.9375rem);
  --s1903-text-caption: clamp(0.75rem, 0.2vw + 0.7rem, 0.8125rem);
  --s1903-text-nav: 14px;
  --s1903-text-btn: 14px;

  /* Spacing */
  --s1903-space-2: 8px;
  --s1903-space-3: 12px;
  --s1903-space-4: 16px;
  --s1903-space-5: 24px;
  --s1903-space-6: 32px;
  --s1903-space-7: 48px;
  --s1903-space-8: 64px;
  --s1903-space-9: 80px;

  /* Motion */
  --s1903-ease: cubic-bezier(0.25, 0.1, 0.25, 1);
  --s1903-duration: 300ms;
  --s1903-duration-slow: 500ms;

  /* Sizes */
  --s1903-btn-height: 48px;
  --s1903-input-height: 48px;
  --s1903-radius: 0;

  /* Hero */
  --s1903-hero-height: min(100vh, 900px);
  --s1903-hero-overlay: linear-gradient(
    135deg,
    rgba(26, 26, 24, 0.55) 0%,
    rgba(26, 26, 24, 0.15) 45%,
    transparent 70%
  );

  /* Aspect ratios */
  --s1903-aspect-founder: 3 / 4;
  --s1903-aspect-case: 4 / 5;
  --s1903-aspect-founder-mobile: 4 / 3;

  font-family: var(--s1903-font);
  font-size: var(--s1903-text-body);
  line-height: 1.65;
  color: var(--s1903-text-primary);
  background: var(--s1903-bg-primary);
  -webkit-font-smoothing: antialiased;
  box-sizing: border-box;
}

#studio1903 *,
#studio1903 *::before,
#studio1903 *::after {
  box-sizing: border-box;
}

#studio1903 img {
  display: block;
  max-width: 100%;
}

#studio1903 a {
  color: inherit;
  text-decoration: none;
}

#studio1903 button {
  font-family: inherit;
  cursor: pointer;
  border: none;
  background: none;
  padding: 0;
}

/* ==========================================================================
   UTILITIES
   ========================================================================== */

#studio1903 .s1903-container {
  width: 100%;
  max-width: var(--s1903-container-max);
  margin-inline: auto;
  padding-inline: var(--s1903-container-pad);
}

#studio1903 .s1903-section-head {
  text-align: center;
  max-width: 42rem;
  margin-inline: auto;
}

#studio1903 .s1903-section-head--left {
  text-align: left;
  margin-inline: 0;
}

#studio1903 .s1903-title {
  font-size: var(--s1903-text-h1);
  font-weight: 400;
  line-height: 1.1;
  letter-spacing: -0.01em;
  margin: 0;
}

#studio1903 .s1903-subtitle {
  font-size: var(--s1903-text-sm);
  font-weight: 400;
  line-height: 1.6;
  color: var(--s1903-text-secondary);
  margin: var(--s1903-space-4) 0 0;
}

#studio1903 .s1903-section-head + .s1903-section-body,
#studio1903 .s1903-section-head + .s1903-grid,
#studio1903 .s1903-section-head + .s1903-steps,
#studio1903 .s1903-section-head + .s1903-cases-grid {
  margin-top: clamp(var(--s1903-space-7), 6vw, var(--s1903-space-9));
}

/* Buttons */
#studio1903 .s1903-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: var(--s1903-btn-height);
  padding: 0 clamp(var(--s1903-space-5), 3vw, var(--s1903-space-6));
  font-size: var(--s1903-text-btn);
  letter-spacing: 0.04em;
  text-transform: uppercase;
  background: var(--s1903-accent);
  color: var(--s1903-text-inverse);
  border-radius: var(--s1903-radius);
  transition: background var(--s1903-duration) var(--s1903-ease),
    transform 100ms var(--s1903-ease);
}

#studio1903 .s1903-btn:hover {
  background: var(--s1903-accent-hover);
}

#studio1903 .s1903-btn:active {
  transform: scale(0.98);
}

#studio1903 .s1903-btn:focus-visible {
  outline: 2px solid var(--s1903-focus-ring);
  outline-offset: 2px;
}

#studio1903 .s1903-btn--inverse {
  background: var(--s1903-text-inverse);
  color: var(--s1903-accent);
}

#studio1903 .s1903-btn--inverse:hover {
  background: var(--s1903-text-inverse);
  color: var(--s1903-accent-hover);
}

#studio1903 .s1903-btn--full {
  width: 100%;
}

/* Ghost link */
#studio1903 .s1903-ghost {
  display: inline-flex;
  align-items: center;
  gap: var(--s1903-space-2);
  font-size: var(--s1903-text-btn);
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--s1903-text-primary);
  border-bottom: 1px solid transparent;
  transition: color var(--s1903-duration) var(--s1903-ease),
    border-color var(--s1903-duration) var(--s1903-ease);
}

#studio1903 .s1903-ghost .s1903-arrow {
  display: inline-block;
  transition: transform var(--s1903-duration) var(--s1903-ease);
}

#studio1903 .s1903-ghost:hover {
  border-bottom-color: var(--s1903-text-primary);
}

#studio1903 .s1903-ghost:hover .s1903-arrow {
  transform: translateX(4px);
}

#studio1903 .s1903-ghost:focus-visible {
  outline: 2px solid var(--s1903-focus-ring);
  outline-offset: 4px;
}

#studio1903 .s1903-micro {
  font-size: var(--s1903-text-caption);
  color: var(--s1903-text-tertiary);
  margin: var(--s1903-space-3) 0 0;
  line-height: 1.45;
}

#studio1903 .s1903-cta-block {
  margin-top: clamp(var(--s1903-space-7), 5vw, var(--s1903-space-8));
  text-align: center;
}

#studio1903 .s1903-link-secondary {
  display: inline-block;
  margin-top: var(--s1903-space-5);
  font-size: var(--s1903-text-sm);
  color: var(--s1903-text-secondary);
  text-decoration: underline;
  text-underline-offset: 3px;
}

#studio1903 .s1903-link-secondary:hover {
  color: var(--s1903-text-primary);
}

/* Reveal */
#studio1903 .s1903-reveal {
  opacity: 0;
  transform: translateY(12px);
  transition: opacity var(--s1903-duration-slow) var(--s1903-ease),
    transform var(--s1903-duration-slow) var(--s1903-ease);
}

#studio1903 .s1903-reveal--visible {
  opacity: 1;
  transform: translateY(0);
}

/* ==========================================================================
   BLOCK: HEADER
   ========================================================================== */

#studio1903 .s1903-header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;
  height: var(--s1903-header-height);
  transition: background var(--s1903-duration) var(--s1903-ease),
    box-shadow var(--s1903-duration) var(--s1903-ease),
    backdrop-filter var(--s1903-duration) var(--s1903-ease);
}

#studio1903 .s1903-header__inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 100%;
  gap: var(--s1903-space-5);
}

#studio1903 .s1903-header__logo {
  display: inline-flex;
  align-items: center;
  flex-shrink: 0;
  line-height: 1;
  transition: color var(--s1903-duration) var(--s1903-ease);
}

#studio1903 .s1903-header__logo-text {
  font-size: 18px;
  font-weight: 500;
  letter-spacing: 0;
  color: var(--s1903-text-inverse);
  transition: color var(--s1903-duration) var(--s1903-ease);
}

#studio1903 .s1903-header__logo-img {
  display: block;
  width: auto;
  height: var(--s1903-logo-height, 34px);
  max-width: min(160px, 42vw);
  object-fit: contain;
  object-position: left center;
}

#studio1903 .s1903-header__logo-img--dark {
  display: none;
}

#studio1903 .s1903-header--scrolled .s1903-header__logo-text,
#studio1903 .s1903-header--light .s1903-header__logo-text {
  color: var(--s1903-text-primary);
}

#studio1903 .s1903-header--scrolled .s1903-header__logo-img--light,
#studio1903 .s1903-header--light .s1903-header__logo-img--light {
  display: none;
}

#studio1903 .s1903-header--scrolled .s1903-header__logo-img--dark,
#studio1903 .s1903-header--light .s1903-header__logo-img--dark {
  display: block;
}

#studio1903 .s1903-header--scrolled .s1903-header__logo,
#studio1903 .s1903-header--light .s1903-header__logo {
  color: var(--s1903-text-primary);
}

#studio1903 .s1903-nav {
  display: none;
  align-items: center;
  gap: var(--s1903-space-6);
}

#studio1903 .s1903-nav__link {
  font-size: var(--s1903-text-nav);
  letter-spacing: 0.02em;
  color: var(--s1903-text-inverse);
  border-bottom: 1px solid transparent;
  transition: color var(--s1903-duration) var(--s1903-ease),
    border-color var(--s1903-duration) var(--s1903-ease);
}

#studio1903 .s1903-header--scrolled .s1903-nav__link,
#studio1903 .s1903-header--light .s1903-nav__link {
  color: var(--s1903-text-primary);
}

#studio1903 .s1903-nav__link:hover {
  border-bottom-color: currentColor;
}

#studio1903 .s1903-header__right {
  display: none;
  align-items: center;
  gap: var(--s1903-space-6);
}

#studio1903 .s1903-header__phone {
  font-size: var(--s1903-text-nav);
  color: var(--s1903-text-inverse-muted);
  transition: color var(--s1903-duration) var(--s1903-ease);
}

#studio1903 .s1903-header--scrolled .s1903-header__phone,
#studio1903 .s1903-header--light .s1903-header__phone {
  color: var(--s1903-text-secondary);
}

#studio1903 .s1903-header__cta {
  font-size: var(--s1903-text-nav);
  letter-spacing: 0.02em;
  color: var(--s1903-text-inverse);
  text-decoration: underline;
  text-underline-offset: 3px;
  text-decoration-color: transparent;
  transition: color var(--s1903-duration) var(--s1903-ease),
    text-decoration-color var(--s1903-duration) var(--s1903-ease);
}

#studio1903 .s1903-header--scrolled .s1903-header__cta,
#studio1903 .s1903-header--light .s1903-header__cta {
  color: var(--s1903-text-primary);
}

#studio1903 .s1903-header__cta:hover {
  text-decoration-color: currentColor;
}

#studio1903 .s1903-header--scrolled {
  background: var(--s1903-header-bg);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  box-shadow: 0 1px 0 rgba(26, 26, 24, 0.06);
}

/* Burger */
#studio1903 .s1903-burger {
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 6px;
  width: 32px;
  height: 32px;
  margin-left: auto;
}

#studio1903 .s1903-burger__line {
  display: block;
  width: 20px;
  height: 1px;
  background: var(--s1903-text-inverse);
  transition: background var(--s1903-duration) var(--s1903-ease);
}

#studio1903 .s1903-header--scrolled .s1903-burger__line,
#studio1903 .s1903-header--light .s1903-burger__line {
  background: var(--s1903-text-primary);
}

#studio1903 .s1903-burger--open .s1903-burger__line:nth-child(1) {
  transform: translateY(3.5px) rotate(45deg);
}

#studio1903 .s1903-burger--open .s1903-burger__line:nth-child(2) {
  opacity: 0;
}

#studio1903 .s1903-burger--open .s1903-burger__line:nth-child(3) {
  transform: translateY(-3.5px) rotate(-45deg);
}

#studio1903 .s1903-burger__line {
  transition: transform var(--s1903-duration) var(--s1903-ease),
    opacity var(--s1903-duration) var(--s1903-ease),
    background var(--s1903-duration) var(--s1903-ease);
}

/* Mobile menu */
#studio1903 .s1903-menu {
  position: fixed;
  inset: 0;
  z-index: 200;
  background: var(--s1903-bg-primary);
  padding: calc(var(--s1903-header-height-mobile) + var(--s1903-space-7)) var(--s1903-container-pad)
    var(--s1903-space-7);
  display: flex;
  flex-direction: column;
  opacity: 0;
  visibility: hidden;
  transition: opacity var(--s1903-duration) var(--s1903-ease),
    visibility var(--s1903-duration) var(--s1903-ease);
}

#studio1903 .s1903-menu--open {
  opacity: 1;
  visibility: visible;
}

#studio1903 .s1903-menu__links {
  display: flex;
  flex-direction: column;
  gap: var(--s1903-space-6);
}

#studio1903 .s1903-menu__link {
  font-size: clamp(1.5rem, 4vw, 1.75rem);
  font-weight: 400;
  line-height: 1.2;
}

#studio1903 .s1903-menu__footer {
  margin-top: auto;
  padding-top: var(--s1903-space-7);
  display: flex;
  flex-direction: column;
  gap: var(--s1903-space-4);
}

#studio1903 .s1903-menu__phone {
  font-size: var(--s1903-text-body);
}

#studio1903 .s1903-menu__cta {
  font-size: var(--s1903-text-btn);
  letter-spacing: 0.04em;
  text-transform: uppercase;
  text-decoration: underline;
  text-underline-offset: 3px;
}

#studio1903 .s1903-menu__address {
  font-size: var(--s1903-text-caption);
  color: var(--s1903-text-tertiary);
}

@media (min-width: 1024px) {
  #studio1903 .s1903-nav {
    display: flex;
  }

  #studio1903 .s1903-header__right {
    display: flex;
  }

  #studio1903 .s1903-burger {
    display: none;
  }

  #studio1903 .s1903-menu {
    display: none !important;
  }
}

@media (max-width: 1023px) {
  #studio1903 {
    --s1903-header-height: var(--s1903-header-height-mobile);
  }
}

/* ==========================================================================
   BLOCK: HERO
   ========================================================================== */

#studio1903 .s1903-hero {
  position: relative;
  min-height: var(--s1903-hero-height);
  display: flex;
  align-items: flex-end;
  overflow: hidden;
}

#studio1903 .s1903-hero__media {
  position: absolute;
  inset: 0;
  z-index: 0;
}

#studio1903 .s1903-hero__img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: 60% center;
}

#studio1903 .s1903-hero__overlay {
  position: absolute;
  inset: 0;
  background: var(--s1903-hero-overlay);
  z-index: 1;
}

#studio1903 .s1903-hero__content {
  position: relative;
  z-index: 2;
  width: 100%;
  padding-bottom: clamp(var(--s1903-space-7), 8vw, var(--s1903-space-9));
  padding-top: calc(var(--s1903-header-height) + var(--s1903-space-7));
  max-width: 38rem;
  opacity: 0;
  transform: translateY(16px);
  transition: opacity 600ms var(--s1903-ease), transform 600ms var(--s1903-ease);
}

#studio1903.s1903--loaded .s1903-hero__content {
  opacity: 1;
  transform: translateY(0);
}

#studio1903 .s1903-hero__title {
  font-size: var(--s1903-text-hero);
  font-weight: 400;
  line-height: 1.05;
  letter-spacing: -0.02em;
  color: var(--s1903-text-inverse);
  margin: 0;
  max-width: 20ch;
}

#studio1903 .s1903-hero__subtitle {
  font-size: var(--s1903-text-body);
  line-height: 1.65;
  color: var(--s1903-text-inverse-muted);
  margin: var(--s1903-space-5) 0 0;
  max-width: 36ch;
}

#studio1903 .s1903-hero__location {
  font-size: var(--s1903-text-caption);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--s1903-text-inverse-muted);
  margin: var(--s1903-space-4) 0 0;
}

#studio1903 .s1903-hero__actions {
  margin-top: clamp(var(--s1903-space-5), 4vw, 40px);
}

@media (max-width: 767px) {
  #studio1903 {
    --s1903-hero-height: 85vh;
  }

  #studio1903 .s1903-hero__title {
    max-width: none;
  }

  #studio1903 .s1903-hero__subtitle {
    max-width: none;
  }
}

/* ==========================================================================
   BLOCK: FOUNDER
   ========================================================================== */

#studio1903 .s1903-founder {
  background: var(--s1903-bg-secondary);
  padding-block: var(--s1903-section-pad-sm);
}

#studio1903 .s1903-founder__grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: var(--s1903-space-6);
  align-items: start;
}

#studio1903 .s1903-founder__media {
  overflow: hidden;
}

#studio1903 .s1903-founder__img {
  display: block;
  width: 100%;
  height: auto;
  object-fit: contain;
  object-position: center top;
}

#studio1903 .s1903-founder__name {
  font-size: var(--s1903-text-h1);
  font-weight: 400;
  line-height: 1.1;
  letter-spacing: -0.01em;
  margin: 0;
}

#studio1903 .s1903-founder__role {
  font-size: var(--s1903-text-sm);
  color: var(--s1903-text-secondary);
  margin: var(--s1903-space-3) 0 0;
}

#studio1903 .s1903-founder__text {
  font-size: var(--s1903-text-body);
  margin: var(--s1903-space-5) 0 0;
  max-width: 36ch;
}

#studio1903 .s1903-founder__phone {
  display: inline-block;
  margin-top: var(--s1903-space-7);
  font-size: var(--s1903-text-body);
}

@media (min-width: 768px) {
  #studio1903 .s1903-founder__grid {
    grid-template-columns: minmax(0, 0.9fr) minmax(0, 1.1fr);
    gap: clamp(var(--s1903-space-7), 6vw, var(--s1903-space-9));
    align-items: center;
  }

  #studio1903 .s1903-founder__media {
    aspect-ratio: var(--s1903-aspect-founder);
  }

  #studio1903 .s1903-founder__img {
    height: 100%;
    object-fit: cover;
  }
}

@media (min-width: 1024px) {
  #studio1903 .s1903-founder__grid {
    grid-template-columns: repeat(12, 1fr);
    gap: var(--s1903-grid-gap);
  }

  #studio1903 .s1903-founder__media {
    grid-column: span 4;
  }

  #studio1903 .s1903-founder__content {
    grid-column: span 5;
  }
}

/* ==========================================================================
   BLOCK: TRUST / EXPERTISE — Grid items
   ========================================================================== */

#studio1903 .s1903-trust {
  background: var(--s1903-bg-primary);
  padding-block: var(--s1903-section-pad);
}

#studio1903 .s1903-expertise {
  background: var(--s1903-bg-secondary);
  padding-block: var(--s1903-section-pad);
}

#studio1903 .s1903-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: var(--s1903-space-7);
}

#studio1903 .s1903-item__label {
  font-size: var(--s1903-text-caption);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--s1903-text-tertiary);
  margin: 0 0 var(--s1903-space-3);
}

/* ==========================================================================
   STUDIO19.03 — Art Direction Layer
   Поверх styles.css. Не меняет структуру, тексты, сетку.
   ========================================================================== */

#studio1903 {
  /* —— Типографика: больше контраста масштаба —— */
  --s1903-text-hero: clamp(2.125rem, 3.2vw + 1.25rem, 3.75rem);
  --s1903-text-h1: clamp(1.875rem, 2vw + 1.125rem, 2.75rem);
  --s1903-text-h3: clamp(1.125rem, 1vw + 0.9rem, 1.375rem);
  --s1903-text-body: clamp(1rem, 0.35vw + 0.92rem, 1.125rem);
  --s1903-text-sm: clamp(0.9375rem, 0.2vw + 0.85rem, 1rem);
  --s1903-text-caption: clamp(0.6875rem, 0.15vw + 0.65rem, 0.75rem);
  --s1903-text-nav: 13px;
  --s1903-text-btn: 13px;

  /* —— Цвет: глубже текст, мягче фоны —— */
  --s1903-bg-primary: #f6f3ee;
  --s1903-bg-secondary: #ece8e1;
  --s1903-text-primary: #141412;
  --s1903-text-secondary: #5c5952;
  --s1903-text-tertiary: #a39e94;
  --s1903-text-inverse-muted: rgba(246, 243, 238, 0.72);
  --s1903-border: #ddd8cf;
  --s1903-border-subtle: #e9e4db;

  /* —— Ритм: больше воздуха между секциями —— */
  --s1903-section-pad: clamp(120px, 14vw, 240px);
  --s1903-section-pad-sm: clamp(96px, 10vw, 200px);
  --s1903-section-pad-compact: clamp(96px, 8vw, 180px);

  /* —— Motion: медленнее, дороже —— */
  --s1903-ease: cubic-bezier(0.16, 1, 0.3, 1);
  --s1903-ease-out: cubic-bezier(0.22, 1, 0.36, 1);
  --s1903-duration: 400ms;
  --s1903-duration-slow: 900ms;

  /* —— Hero: монументальнее —— */
  --s1903-hero-height: 100vh;
  --s1903-hero-overlay: linear-gradient(
    to top,
    rgba(20, 20, 18, 0.72) 0%,
    rgba(20, 20, 18, 0.28) 38%,
    rgba(20, 20, 18, 0.06) 68%,
    transparent 100%
  );

  /* —— Фото: выше кадры —— */
  --s1903-aspect-case: 3 / 4;
  --s1903-aspect-founder: 2 / 3;

  font-feature-settings: 'kern' 1, 'liga' 1, 'calt' 1;
  text-rendering: optimizeLegibility;
}

/* ==========================================================================
   Убрать «шаблонность»: uppercase-кнопки, scale-active, центрирование
   ========================================================================== */

#studio1903 .s1903-btn,
#studio1903 .s1903-ghost,
#studio1903 .s1903-menu__cta {
  text-transform: none;
  letter-spacing: 0.01em;
}

#studio1903 .s1903-btn:active {
  transform: none;
}

/* Hero CTA: не белая «пилюля», а архитектурная рамка */
#studio1903 .s1903-hero .s1903-btn--inverse {
  background: transparent;
  color: var(--s1903-text-inverse);
  border: 1px solid rgba(246, 243, 238, 0.55);
  min-height: 52px;
  padding-inline: 40px;
  font-weight: 400;
  letter-spacing: 0.02em;
}

#studio1903 .s1903-hero .s1903-btn--inverse:hover {
  background: rgba(246, 243, 238, 0.08);
  color: var(--s1903-text-inverse);
  border-color: rgba(246, 243, 238, 0.9);
}

/* Форма: сплошная кнопка остаётся единственной заливкой на странице */
#studio1903 .s1903-contact .s1903-btn {
  min-height: 52px;
  padding-inline: 48px;
  font-weight: 400;
  letter-spacing: 0.02em;
}

/* Ghost: редакционная ссылка, не маркетинговый CTA */
#studio1903 .s1903-ghost {

}

#studio1903 .s1903-ghost .s1903-arrow {

    }

    /* Footer */
    if (c.footer) {
      setText('[data-s1903="footer.logo"]', c.header.logo);
      setText('[data-s1903="footer.copyright"]', c.footer.copyright);
      setText('[data-s1903="footer.address"]', c.footer.address);
      setText('[data-s1903="footer.policy"]', c.footer.policy);
      var policyLink = root.querySelector('[data-s1903-href="footer.policy"]');
      if (policyLink) policyLink.href = c.footer.policyHref;
      var socialWrap = root.querySelector('[data-s1903="footer.social"]');
      if (socialWrap && c.footer.social) {
        socialWrap.innerHTML = '';
        c.footer.social.forEach(function (s, i) {
          if (i > 0) socialWrap.appendChild(document.createTextNode(' · '));
          var a = document.createElement('a');
          a.href = s.href;
          a.className = 's1903-footer__social-link';
          a.textContent = s.label;
          a.target = '_blank';
          a.rel = 'noopener noreferrer';
          socialWrap.appendChild(a);
        });
      }
    }
  }

  function setPlaceholder(id, text) {
    var el = root.querySelector(id);
    if (el) el.placeholder = text;
  }

  function renderItems(selector, items) {
    var wrap = root.querySelector(selector);
    if (!wrap || !items) return;
    wrap.innerHTML = '';
    items.forEach(function (item, index) {
      var div = document.createElement('div');
      div.className = 's1903-item s1903-reveal';
      div.style.transitionDelay = index * 0.1 + 's';
      div.innerHTML =
        '<p class="s1903-item__label">' +
        item.label +
        '</p><p class="s1903-item__text">' +
        item.text +
        '</p>';
      wrap.appendChild(div);
    });
  }

  function renderSteps(selector, steps) {
    var wrap = root.querySelector(selector);
    if (!wrap || !steps) return;
    wrap.innerHTML = '';
    steps.forEach(function (step, index) {
      var div = document.createElement('div');
      div.className = 's1903-step s1903-reveal';
      div.style.transitionDelay = index * 0.07 + 's';
      div.innerHTML =
        '<span class="s1903-step__num">' +
        step.num +
        '</span>' +
        '<div class="s1903-step__body">' +
        '<h3 class="s1903-step__title">' +
        step.title +
        '</h3>' +
        '<p class="s1903-step__text">' +
        step.text +
        '</p>' +
        '</div>';
      wrap.appendChild(div);
    });
  }

  function renderCases(selector, items) {
    var wrap = root.querySelector(selector);
    var imgs = IMAGES.cases || [];
    if (!wrap || !items) return;
    wrap.innerHTML = '';
    items.forEach(function (item, i) {
      var imgData = imgs[i] || {};
      var article = document.createElement('article');
      article.className = 's1903-case s1903-reveal';
      article.style.transitionDelay = i * 0.09 + 's';
      article.innerHTML =
        '<a class="s1903-case__link" href="' +
        (imgData.href || '/portfolio') +
        '">' +
        '<div class="s1903-case__media">' +
        '<img class="s1903-case__img" src="' +
        (imgData.src || '') +
        '" alt="' +
        (imgData.alt || item.title) +
        '" loading="lazy" width="800" height="1000">' +
        '</div>' +
        '<h3 class="s1903-case__title">' +
        item.title +
        '</h3>' +
        '<p class="s1903-case__meta">' +
        item.meta +
        '</p>' +
        '</a>';
      wrap.appendChild(article);
    });
  }

  /* ========== ИЗОБРАЖЕНИЯ ========== */

  function applyImages() {
    if (IMAGES.logo && IMAGES.logo.src) {
      var logoLink = root.querySelector('.s1903-header__logo');
      var logoAlt =
        IMAGES.logo.alt || (CONTENT.header && CONTENT.header.logo) || 'Studio19.03';
      var logoHeight = IMAGES.logo.height || 28;
      var imgLight = root.querySelector('[data-s1903-img="header.logo"]');
      var imgDark = root.querySelector('[data-s1903-img="header.logoDark"]');
      var logoText = root.querySelector('.s1903-header__logo-text');

      if (imgLight) {
        imgLight.src = IMAGES.logo.src;
        imgLight.alt = logoAlt;
        imgLight.height = logoHeight;
        imgLight.removeAttribute('width');
        imgLight.removeAttribute('hidden');
      }
      if (imgDark) {
        imgDark.src = IMAGES.logo.srcDark || IMAGES.logo.src;
        imgDark.alt = logoAlt;
        imgDark.height = logoHeight;
        imgDark.removeAttribute('width');
        imgDark.removeAttribute('hidden');
      }
      if (logoText) logoText.setAttribute('hidden', '');
      if (logoLink) {
        logoLink.setAttribute('aria-label', logoAlt);
        logoLink.style.setProperty('--s1903-logo-height', logoHeight + 'px');
      }
    }

    if (IMAGES.hero) {
      var heroImg = root.querySelector('[data-s1903-img="hero"]');
      if (heroImg) {
        heroImg.src = IMAGES.hero.src;
        heroImg.alt = IMAGES.hero.alt;
        if (IMAGES.hero.position) heroImg.style.objectPosition = IMAGES.hero.position;
      }
    }
    if (IMAGES.founder) {
      var founderImg = root.querySelector('[data-s1903-img="founder"]');
      if (founderImg) {
        founderImg.src = IMAGES.founder.src;
        founderImg.alt = IMAGES.founder.alt;
        if (IMAGES.founder.position) founderImg.style.objectPosition = IMAGES.founder.position;
      }
    }
  }

  /* ========== HEADER SCROLL ========== */

  function initHeader() {
    var header = root.querySelector('.s1903-header');
    if (!header) return;

    function onScroll() {
      if (window.scrollY > 80) {
        header.classList.add('s1903-header--scrolled');
      } else {
        header.classList.remove('s1903-header--scrolled');
      }
    }

    window.addEventListener('scroll', onScroll, { passive: true });
    onScroll();
  }

  /* ========== MOBILE MENU ========== */

  function initMenu() {
    var burger = root.querySelector('.s1903-burger');
    var menu = root.querySelector('.s1903-menu');
    if (!burger || !menu) return;

    function close() {
      burger.classList.remove('s1903-burger--open');
      menu.classList.remove('s1903-menu--open');
      burger.setAttribute('aria-expanded', 'false');
      document.body.style.overflow = '';
    }

    function open() {
      burger.classList.add('s1903-burger--open');
      menu.classList.add('s1903-menu--open');
      burger.setAttribute('aria-expanded', 'true');
      document.body.style.overflow = 'hidden';
    }

    burger.addEventListener('click', function () {
      if (menu.classList.contains('s1903-menu--open')) close();
      else open();
    });

    menu.querySelectorAll('a').forEach(function (a) {
      a.addEventListener('click', close);
    });

    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') close();
    });
  }

  /* ========== SMOOTH SCROLL ========== */

  function initAnchors() {
    root.querySelectorAll('a[href^="#s1903"]').forEach(function (a) {
      a.addEventListener('click', function (e) {
        var id = a.getAttribute('href');
        var target = document.querySelector(id);
        if (!target) return;
        e.preventDefault();
        var headerH = parseInt(
          getComputedStyle(root).getPropertyValue('--s1903-header-height') || '72',
          10
        );
        var top = target.getBoundingClientRect().top + window.scrollY - headerH;
        window.scrollTo({ top: top, behavior: 'smooth' });
      });
    });
  }

  /* ========== SCROLL REVEAL ========== */

  function initReveal() {
    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
      root.querySelectorAll('.s1903-reveal').forEach(function (el) {
        el.classList.add('s1903-reveal--visible');
      });
      return;
    }

    var observer = new IntersectionObserver(
      function (entries) {
        entries.forEach(function (entry) {
          if (entry.isIntersecting) {
            entry.target.classList.add('s1903-reveal--visible');
            observer.unobserve(entry.target);
          }
        });
      },
      { threshold: 0.08, rootMargin: '0px 0px -60px 0px' }
    );

    root.querySelectorAll('.s1903-reveal').forEach(function (el, index) {
      el.style.transitionDelay = Math.min(index * 0.08, 0.48) + 's';
      observer.observe(el);
    });
  }

  /* ========== HERO ENTRANCE ========== */

  function initHeroEntrance() {
    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
    requestAnimationFrame(function () {
      root.classList.add('s1903--loaded');
    });
  }

  /* ========== FORM ========== */

  function initForm() {
    var form = root.querySelector('#s1903-form-element');
    var formBlock = root.querySelector('#s1903-form');
    var success = root.querySelector('#s1903-form-success');
    if (!form || !formBlock) return;

    var errors = (CONTENT.form && CONTENT.form.errors) || {};

    function showError(id, msg) {
      var input = root.querySelector('#' + id);
      var err = root.querySelector('[data-error-for="' + id + '"]');
      if (input) input.classList.add('s1903-input--error');
      if (err) err.textContent = msg;
    }

    function clearErrors() {
      form.querySelectorAll('.s1903-input').forEach(function (i) {
        i.classList.remove('s1903-input--error');
      });
      form.querySelectorAll('.s1903-field__error').forEach(function (e) {
        e.textContent = '';
      });
    }

    function validatePhone(val) {
      var digits = val.replace(/\D/g, '');
      return digits.length >= 10;
    }

    form.addEventListener('submit', function (e) {
      e.preventDefault();
      clearErrors();
      var valid = true;

      var name = root.querySelector('#s1903-name');
      var phone = root.querySelector('#s1903-phone');
      var area = root.querySelector('#s1903-area');
      var privacy = root.querySelector('#s1903-privacy');

      if (!name.value.trim()) {
        showError('s1903-name', errors.name || '');
        valid = false;
      }
      if (!phone.value.trim()) {
        showError('s1903-phone', errors.phone || '');
        valid = false;
      } else if (!validatePhone(phone.value)) {
        showError('s1903-phone', errors.phoneFormat || '');
        valid = false;
      }
      if (!area.value.trim()) {
        showError('s1903-area', errors.area || '');
        valid = false;
      }
      if (!privacy.checked) {
        var privacyErr = root.querySelector('[data-error-for="s1903-privacy"]');
        if (privacyErr) privacyErr.textContent = errors.privacy || '';
        valid = false;
      }

      if (!valid) return;

      /*
       * TILDA: подключите отправку через форму Tilda.
       * Замените блок ниже на вызов tildaForm или action вашей CRM.
       */
      form.hidden = true;
      if (success) success.hidden = false;
      formBlock.scrollIntoView({ behavior: 'smooth', block: 'center' });
    });

    var backBtn = root.querySelector('[data-s1903="form.success.cta"]');
    if (backBtn) {
      backBtn.addEventListener('click', function (e) {
        e.preventDefault();
        var cases = root.querySelector('#s1903-cases');
        if (cases) cases.scrollIntoView({ behavior: 'smooth' });
      });
    }
  }

  /* ========== INIT ========== */

  function init() {
    applyContent();
    applyImages();
    initHeader();
    initMenu();
    initAnchors();
    initReveal();
    initHeroEntrance();
    initForm();

    root.classList.add('s1903-js-ready');

    /* Повторный reveal для динамических элементов */
    setTimeout(initReveal, 100);
    return true;
  }

  function boot() {
    if (!document.getElementById('studio1903')) {
      return false;
    }
    init();
    return true;
  }

  function scheduleBoot() {
    if (boot()) return;
    setTimeout(function () {
      if (boot()) return;
      setTimeout(boot, 1000);
    }, 250);
  }

  if (typeof window.t_onReady === 'function') {
    window.t_onReady(scheduleBoot);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', scheduleBoot);
  } else {
    scheduleBoot();
  }

  window.addEventListener('load', scheduleBoot);
})();

</script>
