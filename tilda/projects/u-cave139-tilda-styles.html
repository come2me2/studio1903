/* ==========================================================================
   STUDIO19.03 — Art Direction Layer
   Поверх styles.css. Не меняет структуру, тексты, сетку.
   ========================================================================== */

#studio1903 {
  /* —— Типографика: больше контраста масштаба —— */
  --s1903-text-hero: clamp(2.125rem, 3.2vw + 1.25rem, 3.75rem);
  --s1903-text-h1: clamp(1.875rem, 2vw + 1.125rem, 2.75rem);
  --s1903-text-h3: clamp(1.125rem, 1vw + 0.9rem, 1.375rem);
  --s1903-text-body: clamp(1rem, 0.35vw + 0.92rem, 1.125rem);
  --s1903-text-sm: clamp(0.9375rem, 0.2vw + 0.85rem, 1rem);
  --s1903-text-caption: clamp(0.6875rem, 0.15vw + 0.65rem, 0.75rem);
  --s1903-text-nav: 13px;
  --s1903-text-btn: 13px;

  /* —— Цвет: глубже текст, мягче фоны —— */
  --s1903-bg-primary: #f6f3ee;
  --s1903-bg-secondary: #ece8e1;
  --s1903-text-primary: #141412;
  --s1903-text-secondary: #5c5952;
  --s1903-text-tertiary: #a39e94;
  --s1903-text-inverse-muted: rgba(246, 243, 238, 0.72);
  --s1903-border: #ddd8cf;
  --s1903-border-subtle: #e9e4db;

  /* —— Ритм: больше воздуха между секциями —— */
  --s1903-section-pad: clamp(120px, 14vw, 240px);
  --s1903-section-pad-sm: clamp(96px, 10vw, 200px);
  --s1903-section-pad-compact: clamp(96px, 8vw, 180px);

  /* —— Motion: медленнее, дороже —— */
  --s1903-ease: cubic-bezier(0.16, 1, 0.3, 1);
  --s1903-ease-out: cubic-bezier(0.22, 1, 0.36, 1);
  --s1903-duration: 400ms;
  --s1903-duration-slow: 900ms;

  /* —— Hero: монументальнее —— */
  --s1903-hero-height: 100vh;
  --s1903-hero-overlay: linear-gradient(
    to top,
    rgba(20, 20, 18, 0.72) 0%,
    rgba(20, 20, 18, 0.28) 38%,
    rgba(20, 20, 18, 0.06) 68%,
    transparent 100%
  );

  /* —— Фото: выше кадры —— */
  --s1903-aspect-case: 3 / 4;
  --s1903-aspect-founder: 2 / 3;

  font-feature-settings: 'kern' 1, 'liga' 1, 'calt' 1;
  text-rendering: optimizeLegibility;
}

/* ==========================================================================
   Убрать «шаблонность»: uppercase-кнопки, scale-active, центрирование
   ========================================================================== */

#studio1903 .s1903-btn,
#studio1903 .s1903-ghost,
#studio1903 .s1903-menu__cta {
  text-transform: none;
  letter-spacing: 0.01em;
}

#studio1903 .s1903-btn:active {

}

#studio1903 .s1903-hero .s1903-btn--inverse {

  color: var(--s1903-text-inverse);

/* Форма: сплошная кнопка остаётся единственной заливкой на странице */
#studio1903 .s1903-contact .s1903-btn {

/* ===================================================================
   FEED — журнальная вёрстка
   Ритм: глава (large) → пара (small) → глава → материалы → финал (full)
   =================================================================== */
.s1903-feed {
  display: flex;
  flex-direction: column;
}

.s1903-feed__figure {
  margin: 0;
  overflow: hidden;
  background: var(--s1903-bg-secondary);
  display: block;
}

.s1903-feed__img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center;
  display: block;
  transition: transform 0.9s var(--s1903-ease);
}

.s1903-feed__figure:hover .s1903-feed__img,
.s1903-feed__figure:focus-within .s1903-feed__img {
  transform: scale(1.03);
}

/* ---------- ГЛАВА: одна крупная фотография ---------- */
.s1903-feed__chapter {
  padding: clamp(40px, 7vh, 96px) clamp(24px, 6vw, 96px);
}

.s1903-feed__chapter .s1903-feed__figure {
  aspect-ratio: 4 / 5;
  max-width: 640px;
  margin-inline: auto;
}

.s1903-feed__chapter--wide .s1903-feed__figure {
  aspect-ratio: 16 / 9;
  max-width: none;
}

.s1903-feed__chapter-label {
  display: flex;
  align-items: baseline;
  gap: 0.75rem;
  max-width: 640px;
  margin: 1.25rem auto 0;
  padding-top: 1rem;
  border-top: 1px solid var(--s1903-border);
}

.s1903-feed__chapter-num {
  font-size: 0.75rem;
  letter-spacing: 0.08em;
  color: var(--s1903-text-tertiary);
  font-variant-numeric: tabular-nums;
}

.s1903-feed__chapter-room {
  font-size: 0.9375rem;
  letter-spacing: -0.005em;
  color: var(--s1903-text-primary);
}

.s1903-feed__chapter-note {
  margin: 0.75rem auto 0;
  max-width: 640px;
  font-size: clamp(0.9375rem, 1.4vw, 1.0625rem);
  font-style: italic;
  line-height: 1.6;
  color: var(--s1903-text-secondary);
}

/* ---------- ПАРА: два фото компактным ритмом ---------- */
.s1903-feed__pair {
  display: grid;
  grid-template-columns: 1fr;
  gap: clamp(12px, 3vw, 20px);
  padding: 0 clamp(24px, 6vw, 96px);
  margin-bottom: clamp(28px, 5vh, 64px);
}

.s1903-feed__pair .s1903-feed__figure {
  aspect-ratio: 3 / 4;
}

/* ---------- MAGAZINE: тройка и дуэт (slow19) ---------- */
.s1903-feed--magazine .s1903-feed__trio,
.s1903-feed--magazine .s1903-feed__duo {
  display: grid;
  grid-template-columns: 1fr;
  gap: clamp(12px, 3vw, 20px);
  padding: 0 clamp(24px, 6vw, 96px);
  margin-bottom: clamp(28px, 5vh, 64px);
}

.s1903-feed--magazine .s1903-feed__trio .s1903-feed__figure,
.s1903-feed--magazine .s1903-feed__duo .s1903-feed__figure {
  aspect-ratio: 3 / 4;
}

.s1903-feed__interlude {
  padding: clamp(48px, 8vh, 100px) clamp(24px, 6vw, 96px);
  margin-bottom: clamp(28px, 5vh, 64px);
  border-block: 1px solid var(--s1903-border);
}

.s1903-feed__interlude-label {
  display: block;
  margin-bottom: clamp(12px, 2vw, 20px);
  font-size: 0.6875rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--s1903-text-tertiary);
}

.s1903-feed__interlude-text {
  margin: 0;
  max-width: 52ch;
  font-size: clamp(1.0625rem, 1.8vw, 1.375rem);
  font-weight: 300;
  line-height: 1.65;
  color: var(--s1903-text-secondary);
}

.s1903-feed__caption {
  display: block;
  padding: 0.65rem 0.15rem 0;
  font-size: clamp(0.8125rem, 1.2vw, 0.9375rem);
  font-style: italic;
  line-height: 1.55;
  letter-spacing: 0;
  text-transform: none;
  color: var(--s1903-text-secondary);
}

/* ---------- QUOTE: редакционная пауза ---------- */
.s1903-feed__quote {
  margin: 0;
  padding: clamp(56px, 10vh, 120px) clamp(24px, 6vw, 96px);
  border-block: 1px solid var(--s1903-border);
  text-align: center;
}

.s1903-feed__quote-mark {
  display: block;
  font-size: clamp(3rem, 8vw, 6rem);
  font-weight: 300;
  line-height: 0.9;
  letter-spacing: -0.04em;
  color: var(--s1903-border);
  margin-bottom: clamp(1rem, 3vw, 1.75rem);
  user-select: none;
}

.s1903-feed__quote-text {
  margin: 0 auto;
  max-width: 22ch;
  font-size: clamp(1.5rem, 4vw, 2.5rem);
  font-weight: 300;
  font-style: italic;
  line-height: 1.3;
  letter-spacing: -0.02em;
  color: var(--s1903-text-primary);
}

/* ---------- WIDE / FULL: полноширинный кадр ---------- */
.s1903-feed__wide {
  margin-bottom: clamp(28px, 5vh, 64px);
}

.s1903-feed__wide .s1903-feed__figure {
  aspect-ratio: 16 / 9;
}

.s1903-feed__wide .s1903-feed__caption {
  padding-inline: clamp(24px, 6vw, 96px);
}

/* ---------- MATERIALS: пауза с материалами проекта ---------- */
.s1903-feed__materials {
  padding: clamp(48px, 8vh, 100px) clamp(24px, 6vw, 96px);
  margin-bottom: clamp(28px, 5vh, 64px);
}

.s1903-feed__materials-label {
  display: block;
  margin-bottom: clamp(20px, 3vw, 32px);
  font-size: 0.6875rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--s1903-text-tertiary);
}

.s1903-feed__materials-row {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: clamp(12px, 2.5vw, 24px);
  max-width: 640px;
}

.s1903-feed__material {
  margin: 0;
}

.s1903-feed__material .s1903-feed__img {
  aspect-ratio: 4 / 5;
}

.s1903-feed__material-caption {
  display: block;
  margin-top: 0.6rem;
  font-size: 0.8125rem;
  color: var(--s1903-text-secondary);
}

/* ===================================================================
   EDITORIAL — факты проекта
   =================================================================== */
.s1903-proj-editorial {
  padding-inline: clamp(24px, 6vw, 96px);
  padding-block: clamp(72px, 12vw, 140px);
  border-top: 1px solid var(--s1903-border);
  margin-top: clamp(40px, 6vw, 72px);
}

.s1903-proj-editorial__story {
  margin-bottom: clamp(2.5rem, 5vw, 4rem);
}

.s1903-proj-editorial__title {
  margin: 0 0 1.25rem;
  font-size: clamp(2rem, 6vw, 4rem);
  font-weight: 300;
  line-height: 1.05;
  letter-spacing: -0.03em;
  color: var(--s1903-text-primary);
}

.s1903-proj-editorial__result {
  margin: 0;
  font-size: clamp(0.9375rem, 1.6vw, 1.0625rem);
  line-height: 1.75;
  color: var(--s1903-text-secondary);
  max-width: 48ch;
}

.s1903-proj-editorial__divider {
  height: 1px;
  background: var(--s1903-border);
  margin-bottom: clamp(2rem, 4vw, 3.5rem);
}

.s1903-proj-editorial__facts {
  display: flex;
  flex-direction: column;
  gap: clamp(1.5rem, 3vw, 2.25rem);
}

.s1903-proj-editorial__fact {
  display: flex;
  flex-direction: column;
  gap: 0.2rem;
}

.s1903-proj-editorial__fact-label {
  font-size: 0.6875rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--s1903-text-tertiary);
}

.s1903-proj-editorial__fact-value {
  font-size: clamp(1.125rem, 3vw, 1.75rem);
  font-weight: 300;
  line-height: 1.15;
  color: var(--s1903-text-primary);
  letter-spacing: -0.015em;
}

/* ===================================================================
   NEXT PROJECT
   =================================================================== */
#studio1903 .s1903-project-next-hero {
  display: block;
  position: relative;
  min-height: 90dvh;
  overflow: hidden;
  text-decoration: none;
  color: var(--s1903-text-inverse);
  margin-top: clamp(40px, 6vw, 72px);
}

.s1903-project-next-hero__img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center;
  display: block;
  transition: transform 0.9s var(--s1903-ease);
}

.s1903-project-next-hero:hover .s1903-project-next-hero__img,
.s1903-project-next-hero:focus-visible .s1903-project-next-hero__img {
  transform: scale(1.04);
}

.s1903-project-next-hero__overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to top,
    rgba(20, 20, 18, 0.72) 0%,
    rgba(20, 20, 18, 0.12) 50%,
    rgba(20, 20, 18, 0.0) 100%
  );
  pointer-events: none;
}

.s1903-project-next-hero__content {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding-inline: clamp(24px, 6vw, 96px);
  padding-bottom: clamp(48px, 8vh, 88px);
  z-index: 1;
}

.s1903-project-next-hero__label {
  display: block;
  margin-bottom: 0.75rem;
  font-size: 0.6875rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: rgba(247, 245, 242, 0.55);
}

.s1903-project-next-hero__title {
  margin: 0 0 0.35rem;
  font-size: clamp(2rem, 5.5vw, 3.5rem);
  font-weight: 300;
  line-height: 1.08;
  letter-spacing: -0.025em;
}

.s1903-project-next-hero__city {
  display: block;
  font-size: clamp(0.875rem, 1.4vw, 1rem);
  color: rgba(247, 245, 242, 0.7);
  margin-bottom: 1.75rem;
}

.s1903-project-next-hero__arrow {
  display: inline-block;
  font-size: clamp(1.25rem, 2vw, 1.625rem);
  font-weight: 300;
  line-height: 1;
  transition: transform 0.4s var(--s1903-ease);
}

.s1903-project-next-hero:hover .s1903-project-next-hero__arrow,
.s1903-project-next-hero:focus-visible .s1903-project-next-hero__arrow {
  transform: translateX(10px);
}

/* ===================================================================
   DESKTOP 768px+
   =================================================================== */
@media (min-width: 768px) {

  /* Intro: две колонки */
  .s1903-proj-intro {
    display: grid;
    grid-template-columns: 1.2fr 0.8fr;
    gap: clamp(48px, 8vw, 120px);
    align-items: end;
  }

  .s1903-proj-intro__num {
    grid-column: 1 / -1;
  }

  /* Editorial: две колонки */
  .s1903-proj-editorial__inner {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: clamp(48px, 8vw, 120px);
    align-items: start;
  }

  .s1903-proj-editorial__story {
    margin-bottom: 0;
  }

  .s1903-proj-editorial__divider {
    display: none;
  }
}

@media (min-width: 1024px) {

  /* ГЛАВА: крупнее и просторнее на десктопе */
  .s1903-feed__chapter {
    padding-block: clamp(64px, 10vh, 140px);
  }

  .s1903-feed__chapter .s1903-feed__figure {
    max-width: 780px;
  }

  .s1903-feed__chapter-label {
    max-width: 780px;
  }

  .s1903-feed__chapter-note {
    max-width: 780px;
  }

  /* ПАРА: чуть более вытянутые кадры, ограничить общую ширину */
  .s1903-feed__pair {
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    max-width: 1100px;
    margin-inline: auto;
    margin-bottom: clamp(48px, 8vh, 96px);
  }

  .s1903-feed__pair .s1903-feed__figure {
    aspect-ratio: 2 / 3;
  }

  .s1903-feed__wide {
    margin-bottom: clamp(48px, 8vh, 96px);
  }

  /* MATERIALS: горизонтальный ряд, а не колонка */
  .s1903-feed__materials-row {
    grid-template-columns: repeat(4, minmax(0, 1fr));
    max-width: none;
  }

  /* MAGAZINE desktop: 3 в ряд, затем 2 в ряд */
  .s1903-feed--magazine .s1903-feed__trio {
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 8px;
    max-width: 1200px;
    margin-inline: auto;
    margin-bottom: clamp(48px, 8vh, 96px);
  }

  .s1903-feed--magazine .s1903-feed__duo {
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 8px;
    max-width: 900px;
    margin-inline: auto;
    margin-bottom: clamp(48px, 8vh, 96px);
  }

  .s1903-feed--magazine .s1903-feed__interlude {
    max-width: 720px;
    margin-inline: auto;
    padding-inline: clamp(24px, 6vw, 96px);
  }

  .s1903-feed--magazine .s1903-feed__interlude-text {
    font-size: clamp(1.25rem, 2vw, 1.5rem);
  }

  .s1903-proj-intro__task {
    font-size: clamp(1.75rem, 2.8vw, 2.5rem);
    max-width: 22ch;
  }
}

/* ===================================================================
   ACCESSIBILITY
   =================================================================== */
@media (prefers-reduced-motion: reduce) {
  .s1903-feed__img,
  .s1903-project-next-hero__img,
  .s1903-project-next-hero__arrow {
    transition: none;
  }

  .s1903-feed__figure:hover .s1903-feed__img,
  .s1903-feed__figure:focus-within .s1903-feed__img {
    transform: none;
  }
}

/* STUDIO19.03 — Этапы, Цены, О нас, Контакты */

#studio1903 .s1903-steps {

  gap: 0;
}

}

}

  line-height: 1;

  font-variant-numeric: tabular-nums;
  padding-top: 0.15em;
}

#studio1903 .s1903-step__title {
  margin: 0 0 0.75rem;
  font-size: clamp(1.125rem, 2vw, 1.5rem);

  letter-spacing: -0.01em;
}

#studio1903 .s1903-step__text {
  margin: 0;
